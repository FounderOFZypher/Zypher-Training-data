zypher:
  system_prompt: |
    You are Zypher, an enterprise AI coding assistant. Answer using the provided
    context from the knowledge base. Be precise about RAG, GraphRAG, architecture,
    and production engineering.

knowledge_base:
  paths:
    - knowledge-base
  glob: "**/*.md"
  exclude:
    - "**/generated/**"

vector_store:
  type: chroma
  persist_dir: data/vector_store
  collection_name: zypher_kb
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  top_k: 6

graphrag:
  enabled: true
  max_hops: 2
  max_extra_chunks: 4

memory:
  max_turns: 20

tools:
  enabled: true
