# Zypher XS — fine-tune base model on Zypher dataset
# Base: poolside/Laguna-XS-2.1 → output: Zypher XS adapter

base_model: poolside/Laguna-XS-2.1
product_name: Zypher XS

model:
  name: poolside/Laguna-XS-2.1
  load_in_4bit: true
  trust_remote_code: true
  attn_implementation: sdpa

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear
  modules_to_save: null

data:
  train_file: data/zypher/train.jsonl
  val_file: data/zypher/val.jsonl

training:
  output_dir: outputs/zypher-xs
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  max_seq_length: 4096
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_total_limit: 2
  gradient_checkpointing: true
  packing: false
  bf16: true
  seed: 42
  report_to: none
  optim: paged_adamw_8bit

inference:
  adapter_path: outputs/zypher-xs/final
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.9
